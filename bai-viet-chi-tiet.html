<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Bài Viết - VCEC Portal</title>
  <meta id="meta-description" name="description" content="Bài viết từ VCEC Portal.">
  <link rel="stylesheet" href="style.css">
  <style>
    .article-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .article-breadcrumb {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 28px;
    }
    .article-breadcrumb a {
      color: var(--vcec-red);
      text-decoration: none;
    }
    .article-breadcrumb a:hover { text-decoration: underline; }
    .article-breadcrumb span { margin: 0 6px; }
    .article-hero-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 32px;
      display: block;
    }
    .article-cat-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
      background: var(--vcec-red);
      color: #fff;
    }
    .article-title {
      font-family: var(--vcec-font-title);
      font-size: clamp(1.5rem, 3.5vw, 2.1rem);
      color: var(--vcec-text-dark);
      line-height: 1.35;
      margin-bottom: 16px;
    }
    .article-meta {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 36px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .article-divider {
      border: none;
      border-top: 2px solid var(--vcec-gold-border);
      margin-bottom: 36px;
    }
    .article-content p {
      font-size: 1rem;
      color: var(--vcec-text-dark);
      line-height: 1.85;
      margin-bottom: 20px;
    }
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 48px;
      padding: 12px 28px;
      background: var(--vcec-red);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    .article-back:hover { opacity: 0.85; }
    #article-loading {
      text-align: center;
      padding: 80px 20px;
      color: #9CA3AF;
      font-size: 1rem;
    }
    #article-error {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: var(--vcec-red);
    }
  </style>
</head>
<body>

  <header id="global-header"></header>

  <main class="bg-china-motif">
    <div class="section-content">

      <div id="article-loading">⏳ Đang tải bài viết...</div>
      <div id="article-error"><p>Không tìm thấy bài viết hoặc đã bị xóa.</p><a href="index.html" class="article-back">← Trang Chủ</a></div>

      <div id="article-container" style="display:none">
        <div class="article-wrap">
          <div id="article-breadcrumb" class="article-breadcrumb"></div>
          <img id="article-img" class="article-hero-img" src="" alt="" loading="lazy" style="display:none">
          <div id="article-cat-badge" class="article-cat-badge"></div>
          <h1 id="article-title" class="article-title"></h1>
          <div class="article-meta">
            <span id="article-date"></span>
            <span id="article-author"></span>
          </div>
          <hr class="article-divider">
          <div id="article-content" class="article-content"></div>
          <a id="article-back-btn" href="index.html" class="article-back">← Quay Lại</a>
        </div>
      </div>

    </div>
  </main>

  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
  (function() {
    var CAT_MAP = {
      'tin-tuc':           { url: 'tin-tuc.html',     vi: 'Tin Tức',           zh: '新闻动态',   en: 'News',              color: '#C8102E' },
      'co-hoi':            { url: 'co-hoi.html',      vi: 'Cơ Hội Đầu Tư',    zh: '投资机会',   en: 'Investment Opp.',   color: '#1D7D3C' },
      'tai-nguyen':        { url: 'tai-nguyen.html',  vi: 'Tài Nguyên',        zh: '资源中心',   en: 'Resources',         color: '#1a56db' },
      'gioi-thieu':        { url: 'gioi-thieu.html',  vi: 'Giới Thiệu',        zh: '关于VCEC',   en: 'About VCEC',        color: '#7C3AED' },
      'quan-he-viet-trung':{ url: 'quan-he.html',     vi: 'Quan Hệ Việt-Trung',zh: '越中关系',   en: 'VN–China Relations',color: '#D97706' },
      'linh-vuc':          { url: 'linh-vuc.html',    vi: 'Lĩnh Vực',          zh: '合作领域',   en: 'Sectors',           color: '#0891B2' },
      'dich-vu':           { url: 'dich-vu.html',     vi: 'Dịch Vụ',           zh: '支持服务',   en: 'Services',          color: '#059669' }
    };

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }

    function tf(p, field) {
      var l = getLang();
      return p[field + '_' + l] || p[field + '_vi'] || '';
    }

    function fmtDate(iso) {
      var d = new Date(iso);
      return d.getDate() + ' Tháng ' + (d.getMonth() + 1) + ', ' + d.getFullYear();
    }

    function renderContent(text) {
      if (!text) return '';
      return text.split(/\n\n+/).map(function(para) {
        return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function renderArticle(post) {
      var lang = getLang();
      var cat = CAT_MAP[post.category] || { url: 'index.html', vi: post.category, zh: post.category, en: post.category, color: '#555' };
      var catLabel = cat[lang] || cat.vi;
      var title = tf(post, 'title');
      var content = tf(post, 'content');
      var summary = tf(post, 'summary');

      // Update page title & meta
      document.title = title + ' - VCEC Portal';
      var metaDesc = document.getElementById('meta-description');
      if (metaDesc) metaDesc.setAttribute('content', summary || title);

      // Breadcrumb
      document.getElementById('article-breadcrumb').innerHTML =
        '<a href="index.html">Trang Chủ</a><span>›</span>' +
        '<a href="' + cat.url + '">' + catLabel + '</a><span>›</span>' +
        '<span style="color:#555">' + title + '</span>';

      // Cover image
      var img = document.getElementById('article-img');
      if (post.cover_image) {
        img.src = post.cover_image;
        img.alt = title;
        img.style.display = 'block';
      }

      // Category badge
      var badge = document.getElementById('article-cat-badge');
      badge.textContent = catLabel;
      badge.style.background = cat.color;

      // Title
      document.getElementById('article-title').textContent = title;

      // Meta
      document.getElementById('article-date').textContent = '📅 ' + fmtDate(post.created_at);
      document.getElementById('article-author').textContent = '✍️ ' + (post.author || 'VCEC');

      // Content
      var contentEl = document.getElementById('article-content');
      if (content && content.trim()) {
        contentEl.innerHTML = renderContent(content);
      } else if (summary && summary.trim()) {
        contentEl.innerHTML = renderContent(summary);
      } else {
        contentEl.innerHTML = '<p style="color:#888;font-style:italic">Nội dung đang được cập nhật.</p>';
      }

      // Back button
      document.getElementById('article-back-btn').href = cat.url;
      document.getElementById('article-back-btn').textContent = '← ' + catLabel;

      // Show container
      document.getElementById('article-loading').style.display = 'none';
      document.getElementById('article-container').style.display = 'block';
    }

    var postId = new URLSearchParams(window.location.search).get('id');
    var cachedPost = null;

    function loadPost() {
      if (!window.supabaseClient) { setTimeout(loadPost, 150); return; }
      if (!postId) {
        document.getElementById('article-loading').style.display = 'none';
        document.getElementById('article-error').style.display = 'block';
        return;
      }
      window.supabaseClient
        .from('vcec_posts')
        .select('*')
        .eq('id', postId)
        .single()
        .then(function(res) {
          if (res.error || !res.data) {
            document.getElementById('article-loading').style.display = 'none';
            document.getElementById('article-error').style.display = 'block';
            return;
          }
          cachedPost = res.data;
          renderArticle(cachedPost);
        });
    }

    loadPost();

    window.addEventListener('vcec-lang-change', function() {
      if (cachedPost) renderArticle(cachedPost);
    });
  })();
  </script>
</body>
</html>
