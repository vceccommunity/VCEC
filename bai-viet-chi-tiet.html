<body>

  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
  (function() {
    var CAT_MAP = {
      'tin-tuc':           { url: 'tin-tuc.html',     vi: 'Tin Tức',           zh: '新闻动态',   en: 'News',              color: '#C8102E' },
      'co-hoi':            { url: 'co-hoi.html',      vi: 'Cơ Hội Đầu Tư',    zh: '投资机会',   en: 'Investment Opp.',   color: '#1D7D3C' },
      'tai-nguyen':        { url: 'tai-nguyen.html',  vi: 'Tài Nguyên',        zh: '资源中心',   en: 'Resources',         color: '#1a56db' },
      'gioi-thieu':        { url: 'gioi-thieu.html',  vi: 'Giới Thiệu',        zh: '关于VCEC',   en: 'About VCEC',        color: '#7C3AED' },
      'quan-he-viet-trung':{ url: 'quan-he.html',     vi: 'Quan Hệ Việt-Trung',zh: '越中关系',   en: 'VN–China Relations',color: '#D97706' },
      'linh-vuc':          { url: 'linh-vuc.html',    vi: 'Lĩnh Vực',          zh: '合作领域',   en: 'Sectors',           color: '#0891B2' },
      'dich-vu':           { url: 'dich-vu.html',     vi: 'Dịch Vụ',           zh: '支持服务',   en: 'Services',          color: '#059669' }
    };

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }

    function tf(p, field) {
      var l = getLang();
      return p[field + '_' + l] || p[field + '_vi'] || '';
    }

    function fmtDate(iso) {
      var d = new Date(iso);
      return d.getDate() + ' Tháng ' + (d.getMonth() + 1) + ', ' + d.getFullYear();
    }

    function renderContent(text) {
      if (!text) return '';
      var t = text.trim();
      if (t.charAt(0) === '<') return t;
      return t.split(/\n\n+/).map(function(para) {
        return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function renderArticle(post) {
      var lang = getLang();
      var cat = CAT_MAP[post.category] || { url: 'index.html', vi: post.category, zh: post.category, en: post.category, color: '#555' };
      var catLabel = cat[lang] || cat.vi;
      var title = tf(post, 'title');
      var content = tf(post, 'content');
      var summary = tf(post, 'summary');

      // Update page title & meta
      document.title = title + ' - VCEC Portal';
      var desc = summary || title;
      var img = post.cover_image || 'public/logo_VCEC.jpg';
      if (document.getElementById('meta-description')) document.getElementById('meta-description').setAttribute('content', desc);
      if (document.getElementById('og-title')) document.getElementById('og-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('og-description')) document.getElementById('og-description').setAttribute('content', desc);
      if (document.getElementById('og-image')) document.getElementById('og-image').setAttribute('content', img);
      if (document.getElementById('tw-title')) document.getElementById('tw-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('tw-description')) document.getElementById('tw-description').setAttribute('content', desc);
      if (document.getElementById('tw-image')) document.getElementById('tw-image').setAttribute('content', img);

      // Breadcrumb
      document.getElementById('article-breadcrumb').innerHTML =
        '<a href="index.html">Trang Chủ</a><span>›</span>' +
        '<a href="' + cat.url + '">' + catLabel + '</a><span>›</span>' +
        '<span style="color:#555">' + title + '</span>';

      // Cover image
      var img = document.getElementById('article-img');
      if (post.cover_image) {
        img.src = post.cover_image;
        img.alt = title;
        img.style.display = 'block';
      }

      // Category badge
      var badge = document.getElementById('article-cat-badge');
      badge.textContent = catLabel;
      badge.style.background = cat.color;

      // Title
      document.getElementById('article-title').textContent = title;

      // Meta
      document.getElementById('article-date').textContent = '📅 ' + fmtDate(post.created_at);
      var authorEl = document.getElementById('article-author');
      authorEl.textContent = '✍️ ' + (post.author || 'VCEC');
      if (post.author) {
        window.supabaseClient
          .from('vcec_users')
          .select('id')
          .eq('username', post.author)
          .single()
          .then(function(r) {
            if (!r.error && r.data) {
              authorEl.innerHTML = '✍️ <a href="ho-so-thanh-vien.html?id=' + r.data.id + '" style="color:var(--vcec-red);text-decoration:none;font-weight:700;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' + post.author + '</a>';
            }
          });
      }

      // Content
      var contentEl = document.getElementById('article-content');
      if (content && content.trim()) {
        contentEl.innerHTML = renderContent(content);
      } else if (summary && summary.trim()) {
        contentEl.innerHTML = renderContent(summary);
      } else {
        contentEl.innerHTML = '<p style="color:#888;font-style:italic">Nội dung đang được cập nhật.</p>';
      }

      // Back button
      document.getElementById('article-back-btn').href = cat.url;
      document.getElementById('article-back-btn').textContent = '← ' + catLabel;

      // Show container
      document.getElementById('article-loading').style.display = 'none';
      document.getElementById('article-container').style.display = 'block';
    }

        content_en: `<p><strong>Hanoi, May 10, 2026</strong> — Within the framework of the official visit by investment promotion agencies from Shenzhen (China), VCEC Investment Promotion Board co-hosted the B2B Forum and the Bilateral Cooperation Signing Ceremony between 12 high-tech Shenzhen corporations and industrial park developers in Hai Phong, Bac Ninh, and Quang Ninh.</p>

        <p><strong>Khung ưu đãi thuế TNDN đột phá áp dụng từ quý II/2026:</strong></p>
        <p>1. <strong>Công thức miễn giảm '4 miễn 9 giảm':</strong> Miễn hoàn toàn thuế TNDN trong 4 năm đầu kể từ khi có thu nhập chịu thuế, và giảm 50% số thuế phải nộp trong 9 năm tiếp theo.</p>
        <p>2. <strong>Thuế suất ưu đãi 10%:</strong> Áp dụng mức thuế suất ưu đãi 10% (so với mức thuế suất phổ thông là 20%) trong thời hạn 15 năm đầu đối với các dự án xây dựng hạ tầng trạm sạc EV lớn, sản xuất pin lưu trữ BESS và các dự án phụ trợ bán dẫn.</p>
        <p>3. <strong>Miễn thuế nhập khẩu tài sản cố định:</strong> Doanh nghiệp được miễn thuế nhập khẩu đối với máy móc, linh kiện kỹ thuật cao tạo tài sản cố định phục vụ dây chuyền sản xuất lắp ráp.</p>
        <p>Các chuyên gia pháp lý VCEC đánh giá: "Đây là chính sách cạnh tranh thuế mạnh mẽ nhất trong khu vực Đông Nam Á, giúp trấn an và hấp dẫn các nhà sản xuất phần cứng bán dẫn Thượng Hải, Thâm Quyến yên tâm dịch chuyển nhà máy đầu tư dài hạn".</p>`,
        content_zh: `<p>越南政府刚刚颁布了关于特殊税收优惠的最新法令，旨在吸引高素质外商直接投资（FDI）流向循环经济、半导体和清洁电动车等重点领域。</p>
        <p><strong>自2026年第二季度起实施的突破性企业所得税（CIT）优惠框架：</strong></p>
        <p>1. <strong>“四免九减半”政策：</strong> 自产生应纳税所得额之年起，前4年免征企业所得税，随后的9年减半征收。</p>
        <p>2. <strong>10%优惠税率：</strong> 对大型电动车充电基础设施建设、BESS电池储能系统制造以及半导体配套工业项目，在前15年内适用10%的优惠税率（标准税率为20%）。</p>
        <p>3. <strong>免征固定资产进口税：</strong> 企业进口用于构成生产线固定资产的高科技机械设备和零部件，免征进口关税。</p>
        <p>VCEC法律专家表示：“这是东南亚最具竞争力的税收政策，可大幅提振上海、深圳等半导体硬件厂商在越南开展中长期建厂投资的信心。”</p>`,
        content_en: `<p>The Government of Vietnam has officially issued a new Decree specifying special tax incentives designed to attract high-quality FDI flows into circular economy, semiconductors, and clean electric vehicle sectors.</p>
        <p><strong>Breakthrough CIT incentive framework starting Q2/2026:</strong></p>
        <p>1. <strong>"4 Exemptions, 9 Reductions" Formula:</strong> 100% CIT exemption for the first 4 years from the first year of taxable income, and a 50% tax reduction for the subsequent 9 years.</p>
        <p>2. <strong>10% Preferential Tax Rate:</strong> A 10% tax rate (compared to the standard rate of 20%) applied for the first 15 years to major EV charging network projects, BESS manufacturing, and supporting semiconductor fabs.</p>
        <p>3. <strong>Import Duty Exemption on Fixed Assets:</strong> Enterprises are exempt from import tariffs on high-tech machinery, tooling, and electronic parts imported to establish assembly production lines.</p>
        <p>VCEC legal experts evaluate: "This is the most aggressive tax competitiveness policy in Southeast Asia, reassuring and attracting hardware manufacturers from Shanghai and Shenzhen to commit to long-term manufacturing shifts."</p>`
      },
      "fb_04": {
        id: "fb_04",
        category: "tin-tuc",
        created_at: "2026-04-20T14:00:00Z",
        author: "vcec_sadmin",
        cover_image: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=800&q=80",
        title_vi: "Số liệu FDI 5 tháng đầu năm 2026: Trung Quốc dẫn đầu số lượng dự án đăng ký mới tại Việt Nam",
        title_zh: "2026年前5个月FDI数据：中国在越南新登记投资项目数量位居首位",
        title_en: "FDI Statistics 2026: China Leads in Number of Newly Registered Projects in Vietnam",
        summary_vi: "Dòng vốn tập trung mạnh mẽ vào các tỉnh trọng điểm phía Bắc như Bắc Ninh, Hải Phòng, Quảng Ninh thuộc chuỗi cung ứng linh kiện điện tử phụ trợ và năng lượng sạch.",
        summary_zh: "资金重点流入北宁、海防、广宁等北部重点省份，主要分布在电子零配件、配套工业及清洁能源供应链领域。",
        summary_en: "Bilateral capital flows focus strongly on northern provinces like Bac Ninh, Hai Phong, and Quang Ninh, supporting electronic supply chains and green sectors.",
        content_vi: `<p>Báo cáo mới nhất từ Cục Đầu tư Nước ngoài (Bộ Kế hoạch và Đầu tư) cho thấy tính đến hết tháng 5 năm 2026, tổng vốn FDI đăng ký mới, điều chỉnh và góp vốn mua cổ phần đạt hơn 12,5 tỷ USD, tăng 14,8% so với cùng kỳ.</p>
        <p>Đáng chú ý, <strong>Trung Quốc đại lục giữ vững vị thế dẫn đầu</strong> về số lượng dự án đăng ký mới, chiếm hơn 28,5% tổng số dự án FDI của cả nước.</p>
        <p><strong>Cơ cấu đầu tư cho thấy các xu hướng đột phá:</strong></p>
        <p>1. <strong>Định vị địa lý:</strong> Bắc Ninh đón nhận nhiều dự án nhất nhờ hệ sinh thái linh kiện thông minh Samsung - Foxconn; tiếp theo là Hải Phòng nhờ hệ thống cảng nước sâu logistics tối ưu.</p>
        <p>2. <strong>Quy mô dòng vốn:</strong> Các dự án lớn có mức vốn trung bình đạt 35 - 80 triệu USD, không còn là các dự án gia công lắp ráp nhỏ lẻ, mà chuyển sang các nhà máy tự động hóa cao, dây chuyền SMT gắn chíp hiện đại.</p>
        <p>VCEC đang tích cực điều phối trực tiếp hơn 40 đoàn doanh nghiệp phụ trợ điện tử khảo sát hạ tầng hàng tuần, hỗ trợ tối ưu thủ tục IRC/ERC một cửa luồng xanh.</p>`,
        content_zh: `<p>越南计划投资部外国投资局最新报告显示，截至2026年5月底，新登记、增资及合资购买股份的外国直接投资（FDI）总额超过125亿美元，同比增长14.8%。</p>
        <p>值得注意的是，<strong>中国大陆在新登记项目数量上稳居首位</strong>，占全国新登记外商投资项目总数的28.5%以上。</p>
        <p><strong>投资结构呈现出以下突破性趋势：</strong></p>
        <p>1. <strong>地理分布：</strong> 得益于三星与富士康等智慧电子配套生态链，北宁省吸引的新项目数量最多；海防市凭借其卓越的深水港和物流系统位列第二。</p>
        <p>2. <strong>资金规模：</strong> 新引入项目平均资本达3500万至8000万美元，已告别低端组装加工时代，全面转向高自动化、集成SMT贴片生产线等高科技工厂。</p>
        <p>VCEC目前正每周积极组织协调40多个电子配套工业企业代表团进行实地考察，协助企业通过“绿色通道”高效办理IRC/ERC一站式行政审批。</p>`,
        content_en: `<p>The latest report from the Foreign Investment Agency (Ministry of Planning and Investment) reveals that as of May 2026, total newly registered, adjusted, and share-acquisition FDI capital reached USD 12.5 billion, a 14.8% increase year-on-year.</p>
        <p>Significantly, <strong>Mainland China secured the leading position</strong> in the number of newly registered projects, accounting for over 28.5% of total foreign investments nationwide.</p>
        <p><strong>The investment structure shows prominent trends:</strong></p>
        <p>1. <strong>Geographical Preference:</strong> Bac Ninh province received the highest project density, leveraging the established Samsung - Foxconn electronics ecosystems; followed by Hai Phong city due to its grade-A deep-sea port logistics.</p>
        <p>2. <strong>Capital Scale:</strong> Major projects average USD 35 - 80 million in capital, shifting away from simple assembly plants towards highly automated, state-of-the-art SMT chip placement production lines.</p>
        <p>VCEC is actively coordinating direct physical surveys for over 40 electronics supporting delegations weekly, providing fast-track "green channel" IRC/ERC services.</p>`
      },
      "fb_05": {
        id: "fb_05",
        category: "tin-tuc",
        created_at: "2026-04-12T07:45:00Z",
        author: "vcec_sadmin",
        cover_image: "https://images.unsplash.com/photo-1486325212027-8081e485255e?auto=format&fit=crop&w=800&q=80",
        title_vi: "Quy hoạch mạng lưới Trạm sạc Xe điện & BESS: Thời cơ cho các nhà cung ứng hạ tầng Trung Quốc",
        title_zh: "电动汽车充电桩与储能系统规划：中国基础设施供应商迎来新商机",
        title_en: "EV Charging Infrastructure & BESS Network Master Plan: Gold Rush for Chinese Infrastructure Suppliers",
        summary_vi: "Với tốc độ đô thị hóa nhanh và mục tiêu trung hòa carbon 2050, Việt Nam đang mở ra cơ hội hàng tỷ USD cho chuỗi cung ứng trạm sạc nhanh và tích trữ điện năng.",
        summary_zh: "凭借高速城市化进程及2050年碳中和目标，越南正为快速充电桩和能源储存系统提供数十亿美元的供应链机遇。",
        summary_en: "With rapid urbanization and net-zero targets by 2050, Vietnam opens up billion-dollar opportunities for EV charging systems and grid energy storage integrations.",
        content_vi: `<p>Trong khuôn khổ Quy hoạch điện VIII (QHĐ8) vừa được cập nhật, Việt Nam đặt mục tiêu phát triển hệ thống điện tích trữ năng lượng quy mô lớn (BESS) đạt công suất tối thiểu 300MW đến năm 2030, kết hợp xây dựng mạng lưới hơn 500.000 cổng sạc xe điện thông minh trên toàn quốc.</p>
        <p>Đây là <strong>thị trường tỷ đô cực kỳ sơ khởi và tiềm năng</strong> đối với các tập đoàn cung cấp hạ tầng điện và tích lũy năng lượng hàng đầu Trung Quốc.</p>
        <p><strong>Cơ hội vàng cho nhà đầu tư hạ tầng:</strong></p>
        <p>1. <strong>Trạm sạc nhanh thông minh dọc quốc lộ:</strong> Xây dựng trạm sạc pin công suất cao (120kW - 360kW) theo hình thức PPP hoặc liên doanh tại các trạm dừng nghỉ quốc lộ, phục vụ xe tải điện và xe cá nhân xuyên miền.</p>
        <p>2. <strong>Thiết bị pin lưu trữ BESS cho trang trại điện gió/mặt trời:</strong> Các nhà máy điện sạch tại Bình Thuận, Ninh Thuận đang bắt buộc phải lắp đặt module BESS để giảm thiểu hiện tượng quá tải đường truyền tải điện quốc gia.</p>
        <p>Đại diện Ban Cố vấn Năng lượng VCEC chia sẻ: "Chúng tôi sẵn sàng làm cầu nối liên kết công nghệ BESS Thâm Quyến với các chủ đầu tư dự án năng lượng nội địa để triển khai các mô hình thử nghiệm tại miền Trung và miền Nam".</p>`,
        content_zh: `<p>在最新更新的越南第八版电力规划（PDP8）框架下，越南确立了至2030年发展至少300MW规模的电池储能系统（BESS）以及在全国建设超过50万个电动汽车智慧充电接口的目标。</p>
        <p>对于中国顶尖的电力基础设施及能源储备集团而言，这是一个<strong>极具开发潜力且尚未饱和的十亿美元级市场</strong>。</p>
        <p><strong>基础设施投资者的黄金商机：</strong></p>
        <p>1. <strong>高速公路大功率快充站：</strong> 在高速公路服务区以PPP（政府与社会资本合作）或合资模式建设大功率（120kW - 360kW）快充网络，服务跨省电动重卡及私人电动客车。</p>
        <p>2. <strong>新能源电厂BESS储能系统配置：</strong> 位于平顺省、宁顺省的大型光伏与风电项目正被迫强制加装BESS储能模组，以降低国家电网调峰压力。</p>
        <p>VCEC能源顾问代表表示：“我们准备充分发挥桥梁作用，将深圳先进的BESS储能系统技术与越南本土清洁能源开发商进行点对点对接，在越南中南部率先落地试点示范项目。”</p>`,
        content_en: `<p>Under the newly updated Power Development Plan VIII (PDP8), Vietnam aims to deploy utility-scale Battery Energy Storage Systems (BESS) of at least 300MW by 2030, integrated with a nationwide network of over 500,000 smart EV charging ports.</p>
        <p>This represents a <strong>multi-billion-dollar greenfield market</strong> with immense potential for leading Chinese power infrastructure and energy storage conglomerates.</p>
        <p><strong>Golden opportunities for infrastructure developers:</strong></p>
        <p>1. <strong>Intelligent High-Power Highway Charging Stations:</strong> Deploying high-capacity chargers (120kW - 360kW) under PPP frameworks or joint ventures along national highways to serve long-haul electric trucks and passenger EVs.</p>
        <p>2. <strong>Utility-Scale BESS for Solar & Wind Farms:</strong> Renewable developers in Binh Thuan and Ninh Thuan provinces are increasingly mandated to deploy BESS modules to mitigate grid congestion on the national transmission network.</p>
        <p>A representative from VCEC's Energy Advisory Board stated: "We are ready to connect cutting-edge BESS technologies from Shenzhen with local utility developers to deploy early pilot systems in Central and Southern Vietnam."</p>`
      },
      "fb_06": {
        id: "fb_06",
        category: "tin-tuc",
        created_at: "2026-04-05T09:20:00Z",
        author: "vcec_sadmin",
        cover_image: "https://images.unsplash.com/photo-1521791136368-1a46827d3ad4?auto=format&fit=crop&w=800&q=80",
        title_vi: "Hành trình BYD xây dựng chuỗi cung ứng linh kiện xe điện nội địa hóa 60% tại Việt Nam",
        title_zh: "比亚迪在越南建设本土化率达60%的电动车零部件供应链纪操",
        title_en: "BYD's Journey in Building a 60% Localized EV Component Supply Chain in Vietnam",
        summary_vi: "Phỏng vấn độc quyền Giám đốc Kỹ thuật BYD Việt Nam về chiến lược kết nối B2B với các đối tác cung ứng công nghiệp phụ trợ tại tỉnh Phú Thọ và Vĩnh Phúc.",
        summary_zh: "独家专访比亚迪越南技术总监，分享与富寿省、永福省配套工业供应商开展B2B对接合作的实战战略。",
        summary_en: "An exclusive interview with BYD Vietnam's Technical Director on B2B alignment with supporting industrial suppliers in Phu Tho and Vinh Phuc provinces.",
        content_vi: `<p>Hãng xe điện khổng lồ BYD đang tiến những bước vững chắc trong việc thiết lập tổ hợp lắp ráp xe điện và hệ sinh thái linh kiện phụ trợ hiện đại tại các tỉnh trung du phía Bắc Việt Nam.</p>
        <p>Trong buổi phỏng vấn độc quyền với Ban Nghiên cứu Thị trường VCEC, Giám đốc Kỹ thuật BYD Việt Nam đã có những chia sẻ cởi mở về kế hoạch nội địa hóa chuỗi cung ứng linh kiện.</p>
        <p><strong>BYD hướng tới xây dựng hệ sinh thái khép kín bền vững:</strong></p>
        <p>1. <strong>Mục tiêu nội địa hóa 60%</strong> về khối lượng linh kiện cơ khí, cụm dây điện, vỏ pin và linh kiện nhựa kỹ thuật cao ngay tại Phú Thọ, Vĩnh Phúc nhằm tối ưu hóa chi phí logistics và thuế xuất khẩu nội vùng RCEP.</p>
        <p>2. <strong>Đối thoại xúc tiến B2B trực tiếp:</strong> BYD đang hợp tác với VCEC tổ chức các sự kiện sàng lọc đối tác cung ứng nội địa định kỳ hàng quý để đánh giá năng lực, khuôn mẫu và độ chính xác của các đơn vị cơ khí chính xác Việt Nam.</p>
        <p>BYD đánh giá cao tay nghề và tinh thần học hỏi của nhân lực kỹ thuật cao Việt Nam: "Sự kết hợp giữa kinh nghiệm quản lý sản xuất tinh gọn của BYD và khả năng thích ứng linh hoạt của các nhà xưởng cơ khí Việt Nam là công thức chiến thắng".</p>`,
        content_zh: `<p>全球电动汽车巨头比亚迪（BYD）在越南北部省份建立现代电动汽车组装基地及零部件配套生态系统的战略正取得稳步进展。</p>
        <p>在接受VCEC市场研究部独家专访时，比亚迪越南技术总监坦诚分享了集团在越南的零部件供应链本土化计划。</p>
        <p><strong>比亚迪致力于构建闭环且可持续的生态链：</strong></p>
        <p>1. <strong>实现60%本土化率的目标：</strong> 计划在富寿省、永福省就地采购机械五金、电缆线束、电池外壳和高精度工程塑料件，以实现物流成本及RCEP区域内出口关税的最优化。</p>
        <p>2. <strong>季度性B2B直接对接会：</strong> 比亚迪正携手VCEC，每季度定期举办本地配套供应商筛选会，对越南本土精密机械加工企业的产能、模具精度及质量控制体系进行全面评估与辅导。</p>
        <p>比亚迪高度评价越南技术工人的操作技能和学习精神：“比亚迪精益生产管理经验同越南机械厂高弹性适应能力的结合，是双赢的完美公式。”</p>`,
        content_en: `<p>EV titan BYD is taking firm strides in establishing its advanced electric vehicle assembly hub and supporting component ecosystems in northern midland provinces of Vietnam.</p>
        <p>In an exclusive interview with VCEC's Market Research Department, the Technical Director of BYD Vietnam discussed plans to localize the automotive parts supply chain.</p>
        <p><strong>BYD aims to construct a highly sustainable, localized supply network:</strong></p>
        <p>1. <strong>60% Localization Target:</strong> Intending to source structural steel, mechanical wiring harnesses, battery casings, and precision engineered plastics locally in Phu Tho and Vĩnh Phúc to optimize RCEP regional export tariffs.</p>
        <p>2. <strong>Direct B2B Sourcing Forums:</strong> BYD partners with VCEC to conduct quarterly supplier matchmaking events to evaluate manufacturing capacities and precision tolerances of local Vietnamese engineering firms.</p>
        <p>The BYD executive highly praised the adaptability of Vietnam's high-tech workforce: "Combining BYD's lean manufacturing management with the agility of Vietnamese workshops is a guaranteed formula for mutual success."</p>`
      }

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }

    function tf(p, field) {
      var l = getLang();
      return p[field + '_' + l] || p[field + '_vi'] || '';
    }

    function fmtDate(iso) {
      var d = new Date(iso);
      return d.getDate() + ' Tháng ' + (d.getMonth() + 1) + ', ' + d.getFullYear();
    }

    function renderContent(text) {
      if (!text) return '';
      var t = text.trim();
      if (t.charAt(0) === '<') return t;
      return t.split(/\n\n+/).map(function(para) {
        return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function renderArticle(post) {
      var lang = getLang();
      var cat = CAT_MAP[post.category] || { url: 'index.html', vi: post.category, zh: post.category, en: post.category, color: '#555' };
      var catLabel = cat[lang] || cat.vi;
      var title = tf(post, 'title');
      var content = tf(post, 'content');
      var summary = tf(post, 'summary');

      // Update page title & meta
      document.title = title + ' - VCEC Portal';
      var desc = summary || title;
      var img = post.cover_image || 'public/logo_VCEC.jpg';
      if (document.getElementById('meta-description')) document.getElementById('meta-description').setAttribute('content', desc);
      if (document.getElementById('og-title')) document.getElementById('og-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('og-description')) document.getElementById('og-description').setAttribute('content', desc);
      if (document.getElementById('og-image')) document.getElementById('og-image').setAttribute('content', img);
      if (document.getElementById('tw-title')) document.getElementById('tw-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('tw-description')) document.getElementById('tw-description').setAttribute('content', desc);
      if (document.getElementById('tw-image')) document.getElementById('tw-image').setAttribute('content', img);

      // Breadcrumb
      document.getElementById('article-breadcrumb').innerHTML =
        '<a href="index.html">Trang Chủ</a><span>›</span>' +
        '<a href="' + cat.url + '">' + catLabel + '</a><span>›</span>' +
        '<span style="color:#555">' + title + '</span>';

      // Cover image
      var imgEl = document.getElementById('article-img');
      if (post.cover_image) {
        imgEl.src = post.cover_image;
        imgEl.alt = title;
        imgEl.style.display = 'block';
      } else {
        imgEl.style.display = 'none';
      }

      // Category badge
      var badge = document.getElementById('article-cat-badge');
      badge.textContent = catLabel;
      badge.style.background = cat.color;

      // Title
      document.getElementById('article-title').textContent = title;

      // Meta
      document.getElementById('article-date').textContent = '📅 ' + fmtDate(post.created_at);
      var authorEl = document.getElementById('article-author');
      authorEl.textContent = '✍️ ' + (post.author || 'VCEC');
      if (post.author && post.author !== 'VCEC' && window.supabaseClient) {
        window.supabaseClient
          .from('vcec_users')
          .select('id')
          .eq('username', post.author)
          .single()
          .then(function(r) {
            if (!r.error && r.data) {
              authorEl.innerHTML = '✍️ <a href="ho-so-thanh-vien.html?id=' + r.data.id + '" style="color:var(--vcec-red);text-decoration:none;font-weight:700;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' + post.author + '</a>';
            }
          });
      }

      // Content
      var contentEl = document.getElementById('article-content');
      if (content && content.trim()) {
        contentEl.innerHTML = renderContent(content);
      } else if (summary && summary.trim()) {
        contentEl.innerHTML = renderContent(summary);
      } else {
        contentEl.innerHTML = '<p style="color:#888;font-style:italic">Nội dung đang được cập nhật.</p>';
      }

      // Back button
      document.getElementById('article-back-btn').href = cat.url;
      document.getElementById('article-back-btn').textContent = '← ' + catLabel;

      // Show container
      document.getElementById('article-loading').style.display = 'none';
      document.getElementById('article-container').style.display = 'block';
    }

    var params = new URLSearchParams(window.location.search);
    var postId = params.get('id');
    var fallbackId = params.get('fallback_id');
    var cachedPost = null;

    function loadPost() {
      // 1. Check if fallback article matches local list
      if (fallbackId && fallbackPosts[fallbackId]) {
        cachedPost = fallbackPosts[fallbackId];
        renderArticle(cachedPost);
        return;
      }

      // 2. Fetch from Supabase
      if (!window.supabaseClient) { setTimeout(loadPost, 150); return; }
      if (!postId) {
        document.getElementById('article-loading').style.display = 'none';
        document.getElementById('article-error').style.display = 'block';
        return;
      }
      window.supabaseClient
        .from('vcec_posts')
        .select('*')
        .eq('id', postId)
        .single()
        .then(function(res) {
          if (res.error || !res.data) {
            document.getElementById('article-loading').style.display = 'none';
            document.getElementById('article-error').style.display = 'block';
            return;
          }
          cachedPost = res.data;
          renderArticle(cachedPost);
        });
    }

    loadPost();

    window.addEventListener('vcec-lang-change', function() {
      if (cachedPost) renderArticle(cachedPost);
    });
  })();
  </script>
</body>
</html>
