<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Bài Viết - VCEC Portal</title>
  <meta id="meta-description" name="description" content="Bài viết từ VCEC Portal.">
  <!-- OpenGraph -->
  <meta id="og-title" property="og:title" content="VCEC Portal">
  <meta id="og-description" property="og:description" content="Bài viết từ VCEC Portal.">
  <meta id="og-image" property="og:image" content="public/logo_VCEC.jpg">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="VCEC Portal">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta id="tw-title" name="twitter:title" content="VCEC Portal">
  <meta id="tw-description" name="twitter:description" content="Bài viết từ VCEC Portal.">
  <meta id="tw-image" name="twitter:image" content="public/logo_VCEC.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="global-header"></header>

  <main class="bg-china-motif">
    <div class="section-content">

      <div id="article-loading" class="article-wrap" style="text-align:center; padding:100px 0;">
        <p style="color: var(--vcec-gold); font-size: 1.2rem;">⏳ Đang tải bài viết...</p>
      </div>

      <div id="article-error" class="article-wrap" style="display:none; text-align:center; padding:100px 0;">
        <h2 class="article-title-main">404</h2>
        <p style="color: var(--vcec-text-light); margin-bottom: 30px;">Không tìm thấy bài viết hoặc đã bị xóa.</p>
        <a href="index.html" class="btn-back-article">← Trang Chủ</a>
      </div>

      <div id="article-container" style="display:none">
        <div class="article-wrap">
          <div id="article-breadcrumb" class="breadcrumb-nav" style="margin-bottom: 30px;"></div>
          <img id="article-img" class="article-hero-img" src="" alt="" loading="lazy" style="display:none">
          
          <div class="article-header">
            <div id="article-cat-badge" class="article-cat-badge"></div>
            <h1 id="article-title" class="article-title-main"></h1>
            <div class="article-meta-info" style="justify-content: center;">
              <span id="article-date"></span>
              <span id="article-author"></span>
            </div>
          </div>

          <div class="article-divider"></div>
          <div id="article-content" class="article-body"></div>
          
          <div style="text-align: center; margin-top: 40px;">
            <a id="article-back-btn" href="index.html" class="btn-back-article">← Quay Lại</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
  (function() {
    var CAT_MAP = {
      'tin-tuc':           { url: 'tin-tuc.html',     vi: 'Tin Tức',           zh: '新闻动态',   en: 'News',              color: '#C8102E' },
      'co-hoi':            { url: 'co-hoi.html',      vi: 'Cơ Hội Đầu Tư',    zh: '投资机会',   en: 'Investment Opp.',   color: '#1D7D3C' },
      'tai-nguyen':        { url: 'tai-nguyen.html',  vi: 'Tài Nguyên',        zh: '资源中心',   en: 'Resources',         color: '#1a56db' },
      'gioi-thieu':        { url: 'gioi-thieu.html',  vi: 'Giới Thiệu',        zh: '关于VCEC',   en: 'About VCEC',        color: '#7C3AED' },
      'quan-he-viet-trung':{ url: 'quan-he.html',     vi: 'Quan Hệ Việt-Trung',zh: '越中关系',   en: 'VN–China Relations',color: '#D97706' },
      'linh-vuc':          { url: 'linh-vuc.html',    vi: 'Lĩnh Vực',          zh: '合作领域',   en: 'Sectors',           color: '#0891B2' },
      'dich-vu':           { url: 'dich-vu.html',     vi: 'Dịch Vụ',           zh: '支持服务',   en: 'Services',          color: '#059669' }
    };

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }

    function tf(p, field) {
      var l = getLang();
      return p[field + '_' + l] || p[field + '_vi'] || '';
    }

    function fmtDate(iso) {
      var d = new Date(iso);
      return d.getDate() + ' Tháng ' + (d.getMonth() + 1) + ', ' + d.getFullYear();
    }

    function renderContent(text) {
      if (!text) return '';
      var t = text.trim();
      if (t.charAt(0) === '<') return t;
      return t.split(/\n\n+/).map(function(para) {
        return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function renderArticle(post) {
      var lang = getLang();
      var cat = CAT_MAP[post.category] || { url: 'index.html', vi: post.category, zh: post.category, en: post.category, color: '#555' };
      var catLabel = cat[lang] || cat.vi;
      var title = tf(post, 'title');
      var content = tf(post, 'content');
      var summary = tf(post, 'summary');

      // Update page title & meta
      document.title = title + ' - VCEC Portal';
      var desc = summary || title;
      var img = post.cover_image || 'public/logo_VCEC.jpg';
      if (document.getElementById('meta-description')) document.getElementById('meta-description').setAttribute('content', desc);
      if (document.getElementById('og-title')) document.getElementById('og-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('og-description')) document.getElementById('og-description').setAttribute('content', desc);
      if (document.getElementById('og-image')) document.getElementById('og-image').setAttribute('content', img);
      if (document.getElementById('tw-title')) document.getElementById('tw-title').setAttribute('content', title + ' - VCEC Portal');
      if (document.getElementById('tw-description')) document.getElementById('tw-description').setAttribute('content', desc);
      if (document.getElementById('tw-image')) document.getElementById('tw-image').setAttribute('content', img);

      // Breadcrumb
      document.getElementById('article-breadcrumb').innerHTML =
        '<a href="index.html">Trang Chủ</a><span>›</span>' +
        '<a href="' + cat.url + '">' + catLabel + '</a><span>›</span>' +
        '<span style="color:#555">' + title + '</span>';

      // Cover image
      var img = document.getElementById('article-img');
      if (post.cover_image) {
        img.src = post.cover_image;
        img.alt = title;
        img.style.display = 'block';
      }

      // Category badge
      var badge = document.getElementById('article-cat-badge');
      badge.textContent = catLabel;
      badge.style.background = cat.color;

      // Title
      document.getElementById('article-title').textContent = title;

      // Meta
      document.getElementById('article-date').textContent = '📅 ' + fmtDate(post.created_at);
      var authorEl = document.getElementById('article-author');
      authorEl.textContent = '✍️ ' + (post.author || 'VCEC');
      if (post.author) {
        window.supabaseClient
          .from('vcec_users')
          .select('id')
          .eq('username', post.author)
          .single()
          .then(function(r) {
            if (!r.error && r.data) {
              authorEl.innerHTML = '✍️ <a href="ho-so-thanh-vien.html?id=' + r.data.id + '" style="color:var(--vcec-red);text-decoration:none;font-weight:700;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' + post.author + '</a>';
            }
          });
      }

      // Content
      var contentEl = document.getElementById('article-content');
      if (content && content.trim()) {
        contentEl.innerHTML = renderContent(content);
      } else if (summary && summary.trim()) {
        contentEl.innerHTML = renderContent(summary);
      } else {
        contentEl.innerHTML = '<p style="color:#888;font-style:italic">Nội dung đang được cập nhật.</p>';
      }

      // Back button
      document.getElementById('article-back-btn').href = cat.url;
      document.getElementById('article-back-btn').textContent = '← ' + catLabel;

      // Show container
      document.getElementById('article-loading').style.display = 'none';
      document.getElementById('article-container').style.display = 'block';
    }

    var postId = new URLSearchParams(window.location.search).get('id');
    var cachedPost = null;

    function loadPost() {
      if (!window.supabaseClient) { setTimeout(loadPost, 150); return; }
      if (!postId) {
        document.getElementById('article-loading').style.display = 'none';
        document.getElementById('article-error').style.display = 'block';
        return;
      }
      window.supabaseClient
        .from('vcec_posts')
        .select('*')
        .eq('id', postId)
        .single()
        .then(function(res) {
          if (res.error || !res.data) {
            document.getElementById('article-loading').style.display = 'none';
            document.getElementById('article-error').style.display = 'block';
            return;
          }
          cachedPost = res.data;
          renderArticle(cachedPost);
        });
    }

    loadPost();

    window.addEventListener('vcec-lang-change', function() {
      if (cachedPost) renderArticle(cachedPost);
    });
  })();
  </script>
</body>
</html>
