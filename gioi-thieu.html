<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Giới Thiệu VCEC - Trung Tâm Giao Lưu & Hợp Tác Kinh Tế Việt Nam - Trung Quốc</title>
  <meta name="description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-about">Giới Thiệu VCEC</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- Professional Introduction Content -->
      <section class="section" style="padding: 60px 0;">
        <div class="container">
          <div id="gioi-thieu-container" class="article-detail-wrap">
            <div class="loading-placeholder" style="text-align:center; padding: 100px 0;">
              <p style="color: var(--vcec-gold); font-size: 1.2rem;" data-i18n="loading">⏳ Đang tải nội dung giới thiệu...</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }

      var cachedPost = null;

      function renderPost(post) {
        var container = document.getElementById('gioi-thieu-container');
        if (!container) return;
        
        if (!post) {
          container.innerHTML = '<div style="text-align:center; padding: 60px 0; color: #999;">Chưa có nội dung giới thiệu chính thức.</div>';
          return;
        }

        var title = tf(post, 'title');
        var summary = tf(post, 'summary');
        var content = tf(post, 'content');
        var coverImg = post.cover_image ? '<img src="' + post.cover_image + '" class="img-fluid rounded-lg shadow-sm mb-5" style="width:100%; max-height:500px; object-fit:cover;">' : '';

        container.innerHTML = 
          '<div class="about-main-article">' +
            '<div class="section-title text-center mb-5">' +
              '<h2 style="color: var(--vcec-red); font-weight: 800; font-size: 2.5rem; font-family: var(--vcec-font-title);">' + title + '</h2>' +
              '<div style="width: 60px; height: 3px; background: var(--vcec-gold); margin: 20px auto;"></div>' +
              '<p class="lead" style="color: #666; max-width: 800px; margin: 0 auto;">' + summary + '</p>' +
            '</div>' +
            '<div class="article-content-box" style="background: #FFF; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.03);">' +
              coverImg +
              '<div class="rich-text-vcec" style="font-size: 1.15rem; line-height: 1.8; color: #333;">' + content + '</div>' +
            '</div>' +
          '</div>';
      }

      function loadPost() {
        if (!window.supabaseClient) { setTimeout(loadPost, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category', 'gioi-thieu')
          .eq('status', 'published')
          .order('created_at', { ascending: true })
          .limit(1)
          .single()
          .then(function(res) {
            cachedPost = res.data;
            renderPost(res.error ? null : res.data);
          });
      }

      loadPost();
      window.addEventListener('vcec-lang-change', function() { if (cachedPost) renderPost(cachedPost); });
    })();
  </script>
</body>
</html>
