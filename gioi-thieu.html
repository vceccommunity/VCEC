<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Giới Thiệu VCEC - Trung Tâm Giao Lưu & Hợp Tác Kinh Tế Việt Nam - Trung Quốc</title>
  <meta name="description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block (Executive Upgrade) -->
      <section class="sub-hero" style="background: linear-gradient(rgba(10, 15, 30, 0.8), rgba(10, 15, 30, 0.8)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1600&q=80') center/cover; padding: 100px 0; border-bottom: 3px solid var(--vcec-gold);">
        <div class="container text-center">
          <h1 style="font-family: var(--vcec-font-title); font-size: 3.5rem; color: #FFF; text-shadow: 0 4px 15px rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px;">
            <span style="color: var(--vcec-gold);">VCEC</span> Profile
          </h1>
          <p style="color: rgba(255,255,255,0.8); font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;" data-i18n="sub-title">Hệ Sinh Thái Xúc Tiến Đầu Tư Song Phương</p>
          <div style="width: 80px; height: 4px; background: var(--vcec-red); margin: 20px auto;"></div>
        </div>
      </section>

      <!-- 1. General Introduction & Brand Story -->
      <section class="section" id="intro-section" style="padding-top: 80px;">
        <div class="container">
          <div id="gioi-thieu-intro" class="brand-story-wrap">
            <!-- Rendered by JS: Chuyên mục 'gioi-thieu-main' -->
          </div>
        </div>
      </section>

      <!-- 2. Vertical Milestones -->
      <section class="section" id="milestones-section" style="background: #F8FAFC; border-top: 1px solid #EEF2F6; border-bottom: 1px solid #EEF2F6;">
        <div class="container">
          <div class="section-title">
            <h2 data-i18n="about-milestones">Lộ Trình Phát Triển VCEC</h2>
            <p>Những cột mốc quan trọng trong hành trình xúc tiến đầu tư song phương</p>
          </div>
          <div id="gioi-thieu-milestones" class="timeline-vcec">
            <!-- Rendered by JS: Chuyên mục 'gioi-thieu-milestone' -->
          </div>
        </div>
      </section>

      <!-- 3. Key Details (Vision, Mission, Leadership) - Full Text -->
      <section class="section" id="details-section">
        <div class="container">
          <div id="gioi-thieu-full-content" class="full-content-stack">
            <!-- Rendered by JS: Chuyên mục 'gioi-thieu' -->
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;">⏳ Đang đồng bộ nội dung chi tiết...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      
      var ICON_MAP = {
        'tầm nhìn': '👁️', 'sứ mệnh': '🚀', 'giá trị': '💎', 'cốt lõi': '🌟',
        'nhân sự': '🏛️', 'ban điều hành': '👨‍💼', 'tổ chức': '🏢',
        'default': '📜'
      };

      function getIcon(title) {
        var t = title.toLowerCase();
        for (var key in ICON_MAP) {
          if (t.includes(key)) return ICON_MAP[key];
        }
        return ICON_MAP['default'];
      }

      function renderIntro(post) {
        var wrap = document.getElementById('gioi-thieu-intro');
        if (!wrap || !post) return;
        var title = tf(post, 'title');
        var content = tf(post, 'content');
        wrap.innerHTML = '<div class="story-content">' +
          '<h2 class="story-title">' + title + '</h2>' +
          '<div class="story-text">' + content + '</div>' +
          '</div>' +
          (post.cover_image ? '<div class="story-image"><img src="' + post.cover_image + '" alt="' + title + '" class="img-fluid rounded-lg shadow-lg"></div>' : '');
      }

      function renderMilestones(data) {
        var wrap = document.getElementById('gioi-thieu-milestones');
        if (!wrap) return;
        if (!data || data.length === 0) {
          wrap.innerHTML = '<p style="text-align:center;color:#9CA3AF;padding:20px;">Đang cập nhật lộ trình...</p>';
          return;
        }
        wrap.innerHTML = data.map(function(p, idx) {
          var side = idx % 2 === 0 ? 'left' : 'right';
          var title = tf(p, 'title');
          var date = new Date(p.created_at);
          var dateStr = 'Tháng ' + (date.getMonth() + 1) + '/' + date.getFullYear();
          return '<div class="timeline-item ' + side + '">' +
            '<div class="timeline-dot"></div>' +
            '<div class="timeline-content">' +
            '<span class="timeline-date-label">' + dateStr + '</span>' +
            '<h3>' + title + '</h3>' +
            '<div class="timeline-text">' + tf(p, 'content') + '</div>' +
            '</div></div>';
        }).join('');
      }

      function renderFullContent(data) {
        var wrap = document.getElementById('gioi-thieu-full-content');
        if (!wrap) return;
        if (!data || data.length === 0) {
          wrap.innerHTML = '';
          return;
        }
        wrap.innerHTML = data.map(function(p, idx) {
          var isEven = idx % 2 === 0;
          var title = tf(p, 'title');
          var content = tf(p, 'content');
          var hasImage = !!p.cover_image;
          
          var imgBlock = hasImage ? '<div class="full-content-image"><img src="' + p.cover_image + '" class="rounded-lg shadow-lg"></div>' : '';
          
          var textPart = '<div class="full-content-text">' +
            '<h2 class="full-content-title">' + title + '</h2>' +
            '<div class="full-content-body">' + content + '</div>' +
            '</div>';

          var blockClass = 'full-content-block' + (hasImage ? '' : ' no-image') + (isEven ? ' row-reverse' : '');
          
          return '<div class="' + blockClass + '">' +
            (isEven ? imgBlock + textPart : textPart + imgBlock) +
            '</div>';
        }).join('');
      }

      function loadData() {
        if (!window.supabaseClient) { setTimeout(loadData, 150); return; }
        
        // 1. Load Main Intro
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category','gioi-thieu-main').eq('status','published')
          .limit(1).single()
          .then(function(res) { if (res.data) { cachedIntro = res.data; renderIntro(res.data); } });

        // 2. Load Milestones
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category','gioi-thieu-milestone').eq('status','published')
          .order('created_at', { ascending: true })
          .then(function(res) { if (res.data) { cachedMilestones = res.data; renderMilestones(res.data); } });

        // 3. Load Details
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category','gioi-thieu').eq('status','published')
          .order('created_at', { ascending: true })
          .then(function(res) { if (res.data) { cachedFull = res.data; renderFullContent(res.data); } });
      }

      var cachedIntro = null;
      var cachedMilestones = null;
      var cachedFull = null;
      loadData();
      window.addEventListener('vcec-lang-change', function() { 
        if (cachedIntro) renderIntro(cachedIntro);
        if (cachedMilestones) renderMilestones(cachedMilestones);
        if (cachedFull) renderFullContent(cachedFull);
      });
    })();
  </script>
</body>
</html>
