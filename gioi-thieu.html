<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Giới Thiệu VCEC - Trung Tâm Giao Lưu & Hợp Tác Kinh Tế Việt Nam - Trung Quốc</title>
  <meta name="description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-about">Giới Thiệu VCEC</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- Dynamic Main Brand Story -->
      <section class="section" id="story-section" style="display:none; border-bottom: 1px solid rgba(168, 27, 52, 0.05);">
        <div class="container">
          <div id="gioi-thieu-story" class="brand-story-wrap">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

      <!-- Highlights Cards -->
      <section class="section">
        <div class="container">
          <div class="section-title">
            <h2 data-i18n="about-highlights">Điểm Nhấn Chiến Lược</h2>
            <p>Tầm nhìn, sứ mệnh, giá trị cốt lõi và ban điều hành</p>
          </div>
          <div id="gioi-thieu-grid" class="service-grid">
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">⏳ Đang tải nội dung...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      
      var ICON_MAP = {
        'tầm nhìn': '👁️', 'sứ mệnh': '🚀', 'giá trị': '💎', 'cốt lõi': '🌟',
        'nhân sự': '🏛️', 'ban điều hành': '👨‍💼', 'tổ chức': '🏢',
        'default': '📜'
      };

      function getIcon(title) {
        var t = title.toLowerCase();
        for (var key in ICON_MAP) {
          if (t.includes(key)) return ICON_MAP[key];
        }
        return ICON_MAP['default'];
      }

      function renderStory(post) {
        var storyDiv = document.getElementById('gioi-thieu-story');
        var section = document.getElementById('story-section');
        if (!storyDiv || !post) return;
        section.style.display = 'block';
        var title = tf(post, 'title');
        var content = tf(post, 'content');
        storyDiv.innerHTML = '<div class="story-content">' +
          '<h2 class="story-title">' + title + '</h2>' +
          '<div class="story-text">' + content + '</div>' +
          '</div>' +
          (post.cover_image ? '<div class="story-image"><img src="' + post.cover_image + '" alt="' + title + '" class="img-fluid rounded-lg shadow-lg"></div>' : '');
      }

      function renderPosts(data) {
        var grid = document.getElementById('gioi-thieu-grid');
        if (!grid) return;
        if (!data || data.length === 0) {
          grid.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">Chưa có nội dung.</p>';
          return;
        }
        grid.innerHTML = data.map(function(p) {
          var title = tf(p,'title');
          return '<a href="bai-viet-chi-tiet.html?id=' + p.id + '" class="service-card" style="text-decoration:none;">' +
            '<div class="service-icon">' + getIcon(title) + '</div>' +
            '<h3 class="service-title">' + title + '</h3>' +
            '<p class="service-desc">' + tf(p,'summary') + '</p>' +
            '</a>';
        }).join('');
      }

      function loadData() {
        if (!window.supabaseClient) { setTimeout(loadData, 150); return; }
        
        // Load Main Story
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category','gioi-thieu-main').eq('status','published')
          .limit(1).single()
          .then(function(res) { if (res.data) { cachedStory = res.data; renderStory(res.data); } });

        // Load Highlights
        window.supabaseClient
          .from('vcec_posts')
          .select('id,title_vi,title_zh,title_en,summary_vi,summary_zh,summary_en,cover_image,created_at')
          .eq('category','gioi-thieu').eq('status','published')
          .order('created_at', { ascending: true })
          .then(function(res) { cachedPosts = res.data; renderPosts(res.error ? null : res.data); });
      }

      var cachedStory = null;
      var cachedPosts = null;
      loadData();
      window.addEventListener('vcec-lang-change', function() { 
        if (cachedStory) renderStory(cachedStory);
        if (cachedPosts) renderPosts(cachedPosts); 
      });
    })();
  </script>
</body>
</html>
