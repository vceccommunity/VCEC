<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Giới Thiệu VCEC - Trung Tâm Giao Lưu & Hợp Tác Kinh Tế Việt Nam - Trung Quốc</title>
  <meta name="description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <meta property="og:title" content="Giới Thiệu VCEC - Trung Tâm Giao Lưu & Hợp Tác Kinh Tế Việt Nam - Trung Quốc">
  <meta property="og:description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <meta property="og:image" content="public/logo_VCEC.jpg">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="VCEC Portal">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Giới Thiệu VCEC">
  <meta name="twitter:description" content="Khám phá Tầm nhìn, Sứ mệnh và Cơ cấu tổ chức của VCEC - Cầu nối tin cậy hàng đầu thúc đẩy hợp tác đầu tư, giao thương song phương Việt Nam - Trung Quốc.">
  <meta name="twitter:image" content="public/logo_VCEC.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero" style="padding: 80px 0 40px;">
        <div class="container text-center">
          <h1 class="article-title-main" style="margin-bottom: 10px;" data-i18n="nav-about">Giới Thiệu VCEC</h1>
          <div style="width: 40px; height: 3px; background: var(--vcec-gold); margin: 0 auto 15px;"></div>
          <p style="color: var(--vcec-gold); font-size: 1rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- Professional Introduction Content -->
      <section class="section" style="padding-top: 0;">
        <div class="container">
          <div id="gioi-thieu-container">
            <div class="article-wrap" style="text-align:center;">
              <p style="color: var(--vcec-gold); font-size: 1.2rem;" data-i18n="loading">⏳ Đang tải nội dung giới thiệu...</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }

      var cachedPost = null;

      function updateSEO(post) {
        var title = tf(post, 'title');
        var summary = tf(post, 'summary');
        var img = post.cover_image || 'public/logo_VCEC.jpg';
        document.querySelector('meta[property="og:title"]').content = title + ' - VCEC Portal';
        document.querySelector('meta[property="og:description"]').content = summary;
        document.querySelector('meta[property="og:image"]').content = img;
        document.querySelector('meta[name="twitter:title"]').content = title;
        document.querySelector('meta[name="twitter:description"]').content = summary;
        document.querySelector('meta[name="twitter:image"]').content = img;
      }

      function renderPost(post) {
        var container = document.getElementById('gioi-thieu-container');
        if (!container) return;

        if (!post) {
          container.innerHTML = '<div class="article-wrap" style="text-align:center; color: #999;">Chưa có nội dung giới thiệu chính thức.</div>';
          return;
        }

        updateSEO(post);
        var title = tf(post, 'title');
        var summary = tf(post, 'summary');
        var content = tf(post, 'content');
        var coverImg = post.cover_image ? '<img src="' + post.cover_image + '" class="article-hero-img" alt="' + title + '">' : '';

        // Determine if content is HTML (from Quill) or plain text
        var formattedContent = content.trim().charAt(0) === '<' ? content : content.split(/\n\n+/).map(function(p){ return '<p>'+p.replace(/\n/g,'<br>')+'</p>'; }).join('');

        container.innerHTML = 
          '<div class="article-wrap">' +
            coverImg +
            '<div class="article-header" style="margin-bottom: 40px; text-align: center;">' +
              '<h2 class="article-title-main" style="font-size: 2.2rem; color: var(--vcec-red);">' + title + '</h2>' +
              '<p class="lead" style="font-size: 1.2rem; color: var(--vcec-text-light); max-width: 800px; margin: 0 auto; line-height: 1.6;">' + summary + '</p>' +
            '</div>' +
            '<div class="article-divider"></div>' +
            '<div class="article-body">' + formattedContent + '</div>' +
          '</div>';
      }

      function loadPost() {
        if (!window.supabaseClient) { setTimeout(loadPost, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category', 'gioi-thieu')
          .eq('status', 'published')
          .order('created_at', { ascending: true })
          .limit(1)
          .single()
          .then(function(res) {
            cachedPost = res.data;
            renderPost(res.error ? null : res.data);
          });
      }

      loadPost();
      window.addEventListener('vcec-lang-change', function() { if (cachedPost) renderPost(cachedPost); });
    })();
  </script>
</body>
</html>
