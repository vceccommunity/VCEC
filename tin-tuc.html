<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Tin Tức & Sự Kiện - VCEC Portal</title>
  <meta name="description" content="Cập nhật tin tức kinh tế vĩ mô song phương Việt - Trung, lịch trình hội nghị xúc tiến đầu tư, và các hoạt động khảo sát thực địa của doanh nghiệp FDI.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with Cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-news">Tin Tức & Sự Kiện</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- News Listing Grid -->
      <section class="section">
        <div class="container">
          <div class="section-title">
            <h2>Hoạt Động Xúc Tiến Nổi Bật</h2>
            <p>Thông tin cập nhật chính thống về chính sách và tiến độ các đoàn khảo sát FDI Việt - Trung</p>
          </div>

          <div id="posts-grid" class="news-grid">
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">⏳ Đang tải bài viết...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      function fmtDate(iso) {
        var d = new Date(iso);
        return d.getDate() + ' Tháng ' + (d.getMonth()+1) + ', ' + d.getFullYear();
      }

      var cachedData = null;

      function renderPosts(data) {
        var grid = document.getElementById('posts-grid');
        if (!grid) return;
        if (!data || data.length === 0) {
          grid.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">Chưa có bài viết nào.</p>';
          return;
        }
        grid.innerHTML = data.map(function(p) {
          return '<a href="bai-viet-chi-tiet.html?id=' + p.id + '" class="news-card">' +
            (p.cover_image ? '<img src="' + p.cover_image + '" alt="" class="news-img" loading="lazy">' : '') +
            '<div class="news-body">' +
              '<span class="news-meta">📅 ' + fmtDate(p.created_at) + ' | TIN TỨC</span>' +
              '<h3 class="news-title">' + tf(p,'title') + '</h3>' +
              '<p class="news-desc">' + tf(p,'summary') + '</p>' +
            '</div></a>';
        }).join('');
      }

      function loadPosts() {
        if (!window.supabaseClient) { setTimeout(loadPosts, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('id,title_vi,title_zh,title_en,summary_vi,summary_zh,summary_en,cover_image,created_at')
          .eq('category','tin-tuc').eq('status','published')
          .order('created_at', { ascending: false })
          .then(function(res) { cachedData = res.data; renderPosts(res.error ? null : res.data); });
      }

      loadPosts();
      window.addEventListener('vcec-lang-change', function() { if (cachedData) renderPosts(cachedData); });
    })();
  </script>
</body>
</html>
