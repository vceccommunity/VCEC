<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Dịch Vụ Doanh Nghiệp - VCEC Portal</title>
  <meta name="description" content="Các giải pháp hỗ trợ doanh nghiệp toàn diện từ tư vấn pháp lý thành lập công ty, hỗ trợ khảo sát KCN, cho đến kết nối đối tác B2B thực chiến Việt - Trung.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.css">
</head>
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with Dong Son drum watermark background -->
  <main class="bg-vietnam-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-services">Dịch Vụ Doanh Nghiệp</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- Dynamic Posts from 'dich-vu' category -->
      <section class="section">
        <div class="container">
          <div class="section-title">
            <h2>Dịch Vụ Hỗ Trợ Doanh Nghiệp</h2>
            <p>Giải pháp toàn diện và quy trình triển khai xúc tiến đầu tư Việt - Trung</p>
          </div>
          <div id="dich-vu-grid" class="service-grid">
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">⏳ Đang tải nội dung...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      
      var ICON_MAP = {
        'pháp lý': '⚖️', 'thành lập': '🏗️', 'khảo sát': '🔍', 'kcn': '🏭', 
        'b2b': '🤝', 'đối tác': '👥', 'vận tải': '🚛', 'hậu cần': '📦',
        'default': '💼'
      };

      function getIcon(title) {
        var t = title.toLowerCase();
        for (var key in ICON_MAP) {
          if (t.includes(key)) return ICON_MAP[key];
        }
        return ICON_MAP['default'];
      }

      var cachedData = null;
      function renderPosts(data) {
        var grid = document.getElementById('dich-vu-grid');
        if (!grid) return;
        if (!data || data.length === 0) {
          grid.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:40px 0;grid-column:1/-1;">Chưa có nội dung.</p>';
          return;
        }
        grid.innerHTML = data.map(function(p) {
          var title = tf(p,'title');
          return '<a href="bai-viet-chi-tiet.html?id=' + p.id + '" class="service-card" style="text-decoration:none;">' +
            '<div class="service-icon">' + getIcon(title) + '</div>' +
            '<h3 class="service-title">' + title + '</h3>' +
            '<p class="service-desc">' + tf(p,'summary') + '</p>' +
            '</a>';
        }).join('');
      }
      function loadPosts() {
        if (!window.supabaseClient) { setTimeout(loadPosts, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('id,title_vi,title_zh,title_en,summary_vi,summary_zh,summary_en,cover_image,created_at')
          .eq('category','dich-vu').eq('status','published')
          .order('created_at', { ascending: true })
          .then(function(res) { cachedData = res.data; renderPosts(res.error ? null : res.data); });
      }
      loadPosts();
      window.addEventListener('vcec-lang-change', function() { if (cachedData) renderPosts(cachedData); });
    })();
  </script>
</body>
</html>
