<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title id="page-title">Lĩnh Vực - VCEC Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .sector-hero-img {
      width: 100%; height: 190px; object-fit: cover;
      display: block; position: relative;
    }
    .sector-hero-overlay {
      position: relative; overflow: hidden;
    }
    .sector-hero-overlay::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(30,58,95,0.55) 0%, rgba(200,16,46,0.45) 100%);
    }
    .sector-hero-overlay img { display: block; width: 100%; height: 190px; object-fit: cover; }
    .sector-hero-text {
      position: absolute; bottom: 40px; left: 0; right: 0;
      z-index: 2; text-align: center; color: #fff; padding: 0 20px;
    }
    .sector-hero-num {
      font-size: 0.85rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--vcec-gold); margin-bottom: 10px; display: block;
    }
    .sector-hero-title {
      font-family: var(--vcec-font-title); font-size: 2.4rem;
      line-height: 1.2; margin-bottom: 12px; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .sector-hero-tagline {
      font-size: 1rem; color: rgba(255,255,255,0.88); max-width: 600px; margin: 0 auto;
    }

    .breadcrumb {
      background: #f9f9f9; border-bottom: 1px solid #eee;
      padding: 12px 0; font-size: 0.82rem; color: #888;
    }
    .breadcrumb a { color: var(--vcec-red); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { margin: 0 8px; }

    .overview-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    }
    .overview-text h2 {
      font-family: var(--vcec-font-title); font-size: 1.8rem;
      color: var(--vcec-text-dark); margin-bottom: 20px;
    }
    .overview-text p {
      font-size: 0.95rem; color: #555; line-height: 1.8; margin-bottom: 16px;
    }
    .overview-img {
      width: 100%; border-radius: 16px; object-fit: cover; height: 320px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .stats-row {
      display: flex; gap: 0; margin-top: 36px;
      border: 1.5px solid var(--vcec-gold-border); border-radius: 12px; overflow: hidden;
    }
    .stat-box {
      flex: 1; text-align: center; padding: 24px 16px;
      border-right: 1.5px solid var(--vcec-gold-border);
    }
    .stat-box:last-child { border-right: none; }
    .stat-val {
      font-family: var(--vcec-font-title); font-size: 2rem;
      color: var(--vcec-red); font-weight: 900; display: block;
    }
    .stat-label { font-size: 0.8rem; color: #777; margin-top: 4px; display: block; }

    .opp-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 36px;
    }
    .opp-card {
      background: #fff; border: 1.5px solid var(--vcec-gold-border);
      border-radius: 14px; padding: 28px 24px;
      transition: all 0.3s ease;
    }
    .opp-card:hover {
      border-color: var(--vcec-red);
      box-shadow: 0 8px 20px rgba(200,16,46,0.08);
      transform: translateY(-4px);
    }
    .opp-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
    .opp-title {
      font-family: var(--vcec-font-title); font-size: 1.05rem;
      color: var(--vcec-text-dark); margin-bottom: 10px;
    }
    .opp-desc { font-size: 0.87rem; color: #666; line-height: 1.6; }

    .why-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 36px;
    }
    .why-item {
      display: flex; gap: 16px; align-items: flex-start;
      background: #fff; border-radius: 12px; padding: 22px;
      border-left: 4px solid var(--vcec-red);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .why-icon { font-size: 1.8rem; flex-shrink: 0; }
    .why-title { font-weight: 700; color: var(--vcec-text-dark); margin-bottom: 6px; font-size: 0.95rem; }
    .why-desc { font-size: 0.85rem; color: #666; line-height: 1.6; }

    .cta-band {
      background: linear-gradient(135deg, var(--vcec-navy) 0%, var(--vcec-red) 100%);
      border-radius: 20px; padding: 50px 40px; text-align: center; color: #fff;
    }
    .cta-band h2 { font-family: var(--vcec-font-title); font-size: 1.9rem; margin-bottom: 14px; }
    .cta-band p { font-size: 1rem; color: rgba(255,255,255,0.82); margin-bottom: 28px; max-width: 500px; margin-left: auto; margin-right: auto; }

    @media (max-width: 900px) {
      .overview-grid { grid-template-columns: 1fr; gap: 30px; }
      .opp-grid { grid-template-columns: 1fr 1fr; }
      .why-grid { grid-template-columns: 1fr; }
      .sector-hero-title { font-size: 1.7rem; }
    }
    @media (max-width: 600px) {
      .opp-grid { grid-template-columns: 1fr; }
      .stats-row { flex-direction: column; }
      .stat-box { border-right: none; border-bottom: 1.5px solid var(--vcec-gold-border); }
      .stat-box:last-child { border-bottom: none; }
      .cta-band { padding: 36px 20px; }
    }

    #not-found { text-align: center; padding: 100px 20px; color: #888; }
  </style>
</head>

        overview: {

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
    function tf(obj, fallback) {
      if (!obj) return fallback || '';
      var l = getLang();
      return obj[l] || obj['vi'] || fallback || '';
    }

    function render(sector) {
      var l = getLang();
      document.getElementById('page-title').textContent = tf(sector.title) + ' - VCEC Portal';
      document.getElementById('hero-img').src = sector.img;
      document.getElementById('hero-img').alt = tf(sector.title);
      document.getElementById('hero-num').textContent = sector.num;
      document.getElementById('hero-title').textContent = tf(sector.title);
      document.getElementById('hero-tagline').textContent = tf(sector.tagline);
      document.getElementById('bc-title').textContent = tf(sector.title);

      document.getElementById('ov-title').textContent = tf(sector.overview_title);
      document.getElementById('ov-body').innerHTML = tf(sector.overview);
      document.getElementById('ov-img').src = sector.img2;
      document.getElementById('ov-img').alt = tf(sector.title);

      // Stats
      document.getElementById('stats-row').innerHTML = sector.stats.map(function(s) {
        return '<div class="stat-box"><span class="stat-val">' + s.val + '</span><span class="stat-label">' + tf(s.label) + '</span></div>';
      }).join('');

      // Opportunities
      document.getElementById('opp-sub').textContent = tf(sector.opp_sub);
      document.getElementById('opp-grid').innerHTML = sector.opportunities.map(function(o) {
        return '<div class="opp-card"><span class="opp-icon">' + o.icon + '</span><h3 class="opp-title">' + tf(o.title) + '</h3><p class="opp-desc">' + tf(o.desc) + '</p></div>';
      }).join('');

      // Why
      document.getElementById('why-grid').innerHTML = sector.why.map(function(w) {
        return '<div class="why-item"><span class="why-icon">' + w.icon + '</span><div><div class="why-title">' + tf(w.title) + '</div><div class="why-desc">' + tf(w.desc) + '</div></div></div>';
      }).join('');

      // CTA
      document.getElementById('cta-title').textContent = tf(sector.cta_title);
      document.getElementById('cta-desc').textContent = tf(sector.cta_desc);
    }

    var params = new URLSearchParams(window.location.search);
    var id = params.get('id') || '';
    var sector = SECTORS[id];

    if (!sector) {
      document.getElementById('sector-not-found').style.display = '';
    } else {
      document.getElementById('sector-content').style.display = '';
      render(sector);
      window.addEventListener('vcec-lang-change', function() { render(sector); });
    }
