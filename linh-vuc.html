<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Lĩnh Vực Hợp Tác Trọng Điểm - VCEC Portal</title>
  <meta name="description" content="Chi tiết 8 lĩnh vực hợp tác kinh tế - thương mại chiến lược được VCEC thúc đẩy, bao gồm bán dẫn điện tử, năng lượng sạch, KCN, dệt may, kinh tế số.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with Cloud watermark background -->
  <main class="bg-china-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="sectors-title" style="text-transform: uppercase;">8 MẢNG HỢP TÁC TRỌNG ĐIỂM</h1>
          <p style="color: #946E26; font-size: 1.1rem; max-width: 100%; margin: 10px auto 0;" data-i18n="sectors-subtitle">Các lĩnh vực chiến lược thúc đẩy xúc tiến dòng vốn FDI chính ngạch sang Việt Nam</p>
        </div>
      </section>

      <!-- Sectors Detailed Cards Grid -->
      <section class="section">
        <div class="container">
          <div id="sector-grid" class="sector-detail-grid">
            <!-- Dynamically loaded from vcec_posts (category: linh-vuc) -->
            <!-- Fallback hardcoded cards shown while loading or if DB unavailable -->
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    // Fallback sector data (shown if DB has no linh-vuc posts yet)
    const SECTOR_FALLBACK = [
      { num:'01', slug:'logistics', titleKey:'sec-logistics', descKey:'sec-logistics-desc',
        img:'https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&w=500&q=80',
        title:'Logistics & Chuỗi cung ứng', desc:'Vận tải liên vận đa phương thức, trung tâm kho bãi thông minh xuyên biên giới.' },
      { num:'02', slug:'energy', titleKey:'sec-energy', descKey:'sec-energy-desc',
        img:'https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&w=500&q=80',
        title:'Năng lượng xanh & BESS', desc:'Phát triển dự án điện gió, điện mặt trời và hệ thống lưu trữ năng lượng (BESS) hiện đại.' },
      { num:'03', slug:'ev', titleKey:'sec-ev', descKey:'sec-ev-desc',
        img:'https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&w=500&q=80',
        title:'Xe điện (EV) & Trạm sạc', desc:'Sản xuất phương tiện giao thông điện, chuỗi cung ứng pin và hạ tầng trạm sạc nhanh.' },
      { num:'04', slug:'ebike', titleKey:'sec-ebike', descKey:'sec-ebike-desc',
        img:'https://images.unsplash.com/photo-1485965120184-e220f721d03e?auto=format&fit=crop&w=500&q=80',
        title:'E-bike Sharing', desc:'Giải pháp di chuyển xanh đô thị thông minh bằng xe đạp điện chia sẻ công nghệ cao.' },
      { num:'05', slug:'drone', titleKey:'sec-drone', descKey:'sec-drone-desc',
        img:'https://images.unsplash.com/photo-1484712401471-05c7215e66eb?auto=format&fit=crop&w=500&q=80',
        title:'Drone & Robot công nghiệp', desc:'Ứng dụng thiết bị bay không người lái và giải pháp tự động hóa robot trong sản xuất.' },
      { num:'06', slug:'smart-mfg', titleKey:'sec-smart-mfg', descKey:'sec-smart-mfg-desc',
        img:'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=500&q=80',
        title:'Sản xuất thông minh', desc:'Nhà máy số hóa, tự động hóa cao, sản xuất thiết bị bán dẫn và điện tử thế hệ mới.' },
      { num:'07', slug:'agri', titleKey:'sec-agri', descKey:'sec-agri-desc',
        img:'https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?auto=format&fit=crop&w=500&q=80',
        title:'Nông nghiệp công nghệ cao', desc:'Công nghệ canh tác thông minh, chế biến sâu xuất khẩu nông sản chính ngạch giá trị cao.' },
      { num:'08', slug:'culture', titleKey:'sec-culture', descKey:'sec-culture-desc',
        img:'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=500&q=80',
        title:'Du lịch & Văn hóa', desc:'Xúc tiến kết nối du lịch lữ hành, giao lưu văn hóa nghệ thuật và bảo tồn di sản Việt - Trung.' }
    ];

    function renderFallback() {
      const grid = document.getElementById('sector-grid');
      const lang = localStorage.getItem('vcec_lang') || 'vi';
      grid.innerHTML = SECTOR_FALLBACK.map(s => `
        <a href="linh-vuc-chi-tiet.html?id=${s.slug}" class="sector-detail-card">
          <img src="${s.img}" alt="${s.title}" class="sector-detail-img" loading="lazy">
          <div class="sector-detail-body">
            <span class="sector-number">Sector ${s.num}</span>
            <h3 class="sector-detail-title" data-i18n="${s.titleKey}">${s.title}</h3>
            <p class="sector-detail-desc" data-i18n="${s.descKey}">${s.desc}</p>
          </div>
        </a>`).join('');
    }

    function renderDbSectors(posts) {
      const grid = document.getElementById('sector-grid');
      const lang = localStorage.getItem('vcec_lang') || 'vi';
      const tf = (post, f) => post[`${f}_${lang}`] || post[`${f}_vi`] || '';
      grid.innerHTML = posts.map((post, i) => {
        const link = post.id ? `bai-viet-chi-tiet.html?id=${post.id}` : '#';
        const img  = post.cover_image || SECTOR_FALLBACK[i]?.img || '';
        const num  = String(i + 1).padStart(2, '0');
        return `
          <a href="${link}" class="sector-detail-card">
            <img src="${img}" alt="${tf(post,'title')}" class="sector-detail-img" loading="lazy"
              onerror="this.src='${SECTOR_FALLBACK[i]?.img || ''}'">
            <div class="sector-detail-body">
              <span class="sector-number">Sector ${num}</span>
              <h3 class="sector-detail-title">${tf(post,'title')}</h3>
              <p class="sector-detail-desc">${tf(post,'summary')}</p>
            </div>
          </a>`;
      }).join('');
    }

    // Show fallback immediately, then try to load from DB
    renderFallback();

    (async () => {
      const posts = await window.vcecPagePosts('linh-vuc', 8);
      if (posts && posts.length > 0) {
        renderDbSectors(posts);
      }
      // else: fallback stays
    })();
  </script>
</body>
</html>
