<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Tài Nguyên & Kiến Thức Xúc Tiến Đầu Tư - VCEC Portal</title>
  <meta name="description" content="Thư viện cẩm nang đầu tư FDI, văn bản pháp luật đầu tư Việt Nam biên dịch song ngữ Việt Trung và hướng dẫn quy chuẩn kỹ thuật cho doanh nghiệp nước ngoài.">
  <link rel="stylesheet" href="style.css">
  <style>
    .resource-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 40px;
    }
    .resource-item {
      background: #FFFFFF;
      border: 1px solid var(--vcec-gold-border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
    }
    .resource-item:hover {
      border-color: var(--vcec-red);
      transform: translateX(6px);
      box-shadow: -4px 4px 10px rgba(200,16,46,0.03);
    }
    .resource-icon-box {
      background: rgba(200, 16, 46, 0.05);
      width: 54px;
      height: 54px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--vcec-red);
      font-size: 1.5rem;
      font-weight: bold;
    }
    .resource-info {
      flex: 1;
    }
    .resource-title {
      font-family: var(--vcec-font-title);
      font-size: 1.1rem;
      color: var(--vcec-text-dark);
      margin-bottom: 6px;
    }
    .resource-meta {
      font-size: 0.8rem;
      color: #777;
    }
    @media (max-width: 768px) {
      .resource-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .resource-item .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with Dong Son drum watermark background -->
  <main class="bg-vietnam-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-resources">Tài Nguyên & Kiến Thức</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="sub-title">ĐẦU TƯ SONG PHƯƠNG</p>
        </div>
      </section>

      <!-- Resource Download Library -->
      <section class="section">
        <div class="container" style="max-width: 900px;">
          <div class="section-title">
            <h2>Thư Viện Pháp Lý & Sổ Tay Đầu Tư</h2>
            <p>Tải xuống tài liệu hướng dẫn đầu tư song ngữ chính thống được biên soạn bởi Ban Pháp chế VCEC</p>
          </div>

          <div id="resources-list" class="resource-list">
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;">⏳ Đang tải tài nguyên...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      function fmtDate(iso) {
        var d = new Date(iso);
        return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
      }

      var cachedData = null;

      function renderResources(data) {
        var list = document.getElementById('resources-list');
        if (!list) return;
        if (!data || data.length === 0) {
          list.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:40px 0;">Chưa có tài nguyên nào.</p>';
          return;
        }
        list.innerHTML = data.map(function(p) {
          return '<div class="resource-item">' +
            '<div class="resource-icon-box">📄</div>' +
            '<div class="resource-info">' +
              '<h3 class="resource-title">' + tf(p,'title') + '</h3>' +
              '<p class="resource-meta">' + tf(p,'summary') + ' | Cập nhật: ' + fmtDate(p.created_at) + '</p>' +
            '</div>' +
            '<a href="lien-he.html" class="btn btn-primary" style="padding:10px 20px;font-size:0.85rem;white-space:nowrap;">Yêu cầu tài liệu</a>' +
          '</div>';
        }).join('');
      }

      function loadResources() {
        if (!window.supabaseClient) { setTimeout(loadResources, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('id,title_vi,title_zh,title_en,summary_vi,summary_zh,summary_en,created_at')
          .eq('category','tai-nguyen').eq('status','published')
          .order('created_at', { ascending: false })
          .then(function(res) { cachedData = res.data; renderResources(res.error ? null : res.data); });
      }

      loadResources();
      window.addEventListener('vcec-lang-change', function() { if (cachedData) renderResources(cachedData); });
    })();
  </script>
</body>
</html>
