<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="public/logo_VCEC.jpg">
  <title>Hồ Sơ Thành Viên - VCEC Portal</title>
  <meta name="description" content="Thông tin thành viên VCEC Portal.">
  <link rel="stylesheet" href="style.css">
  <style>
    .member-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .member-breadcrumb {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 32px;
    }
    .member-breadcrumb a { color: var(--vcec-red); text-decoration: none; }
    .member-breadcrumb a:hover { text-decoration: underline; }
    .member-breadcrumb span { margin: 0 6px; }

    .member-card {
      display: flex;
      align-items: center;
      gap: 28px;
      background: #fff;
      border: 1px solid var(--vcec-gold-border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .member-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--vcec-red) 0%, var(--vcec-gold) 100%);
      color: #fff;
      font-size: 2.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 3px solid var(--vcec-gold-border);
    }
    .member-info { flex: 1; min-width: 200px; }
    .member-name {
      font-family: var(--vcec-font-title);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--vcec-text-dark);
      margin: 0 0 10px;
    }
    .member-role-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .member-meta {
      font-size: 0.83rem;
      color: #888;
    }

    .posts-section-title {
      font-family: var(--vcec-font-title);
      font-size: 1.2rem;
      color: var(--vcec-text-dark);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--vcec-gold-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .member-post-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .member-post-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: #fff;
      border: 1px solid var(--vcec-gold-border);
      border-radius: 10px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s;
    }
    .member-post-item:hover {
      border-color: var(--vcec-red);
      transform: translateX(4px);
    }
    .member-post-thumb {
      width: 72px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .member-post-body { flex: 1; }
    .member-post-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--vcec-text-dark);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .member-post-meta {
      font-size: 0.78rem;
      color: #888;
    }
    .member-post-cat {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-right: 8px;
    }

    #member-loading { text-align:center; padding:80px 20px; color:#9CA3AF; }
    #member-error { display:none; text-align:center; padding:80px 20px; color:var(--vcec-red); }

    @media (max-width: 480px) {
      .member-card {
        padding: 22px 16px;
        gap: 18px;
      }
      .member-avatar {
        width: 72px;
        height: 72px;
        font-size: 1.8rem;
      }
      .member-name {
        font-size: 1.3rem;
      }
      .member-post-item {
        padding: 14px 16px;
        gap: 12px;
      }
      .member-post-thumb {
        width: 56px;
        height: 42px;
      }
    }
  </style>
</head>
<body>

  <header id="global-header"></header>

  <main class="bg-china-motif">
    <div class="section-content">

      <div id="member-loading">⏳ Đang tải hồ sơ...</div>
      <div id="member-error"><p>Không tìm thấy thành viên này.</p><a href="index.html" style="color:var(--vcec-red);">← Trang Chủ</a></div>

      <div id="member-container" style="display:none;">
        <div class="member-wrap">
          <div class="member-breadcrumb">
            <a href="index.html">Trang Chủ</a><span>›</span>
            <span>Hồ Sơ Thành Viên</span>
          </div>

          <div class="member-card">
            <div id="member-avatar" class="member-avatar">?</div>
            <div class="member-info">
              <h1 id="member-name" class="member-name"></h1>
              <div id="member-role-badge" class="member-role-badge"></div>
              <div id="member-meta" class="member-meta"></div>
            </div>
          </div>

          <div id="member-posts-wrap">
            <div class="posts-section-title">✍️ Bài viết đã đăng</div>
            <div id="member-post-list" class="member-post-list">
              <p style="color:#9CA3AF;">⏳ Đang tải bài viết...</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
  (function() {
    var ROLE_LABELS = {
      super_admin: { vi: 'Quản Trị Cấp Cao', color: '#C8102E' },
      admin:       { vi: 'Quản Trị Viên',    color: '#7C3AED' },
      leader:      { vi: 'Trưởng Nhóm',      color: '#D97706' },
      partner:     { vi: 'Đối Tác',           color: '#1D7D3C' },
      staff:       { vi: 'Nhân Viên',         color: '#0891B2' },
      customer:    { vi: 'Khách Hàng',        color: '#374151' },
      member:      { vi: 'Thành Viên',        color: '#6B7280' },
      cn_investor: { vi: 'Nhà đầu tư & doanh nghiệp TQ', color: '#C8102E' },
      vn_company:  { vi: 'Doanh nghiệp Việt Nam', color: '#AF883A' },
      department:  { vi: 'Cơ quan & hiệp hội',    color: '#1D7D3C' },
      rnd_media:   { vi: 'Truyền thông & nghiên cứu', color: '#0891B2' }
    };

    var CAT_COLORS = {
      'tin-tuc': '#C8102E', 'co-hoi': '#1D7D3C', 'tai-nguyen': '#1a56db',
      'gioi-thieu': '#7C3AED', 'quan-he-viet-trung': '#D97706',
      'linh-vuc': '#0891B2', 'dich-vu': '#059669'
    };
    var CAT_LABELS = {
      'tin-tuc': 'Tin Tức', 'co-hoi': 'Cơ Hội', 'tai-nguyen': 'Tài Nguyên',
      'gioi-thieu': 'Giới Thiệu', 'quan-he-viet-trung': 'Quan Hệ VN-TQ',
      'linh-vuc': 'Lĩnh Vực', 'dich-vu': 'Dịch Vụ'
    };

    function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
    function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
    function fmtDate(iso) {
      var d = new Date(iso);
      return 'Tham gia: ' + d.getDate() + ' Tháng ' + (d.getMonth()+1) + ', ' + d.getFullYear();
    }
    function fmtPostDate(iso) {
      var d = new Date(iso);
      return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
    }

    var memberId = new URLSearchParams(window.location.search).get('id');

    function renderMember(user, posts) {
      var role = ROLE_LABELS[user.role] || { vi: user.role, color: '#6B7280' };
      var initial = (user.username || '?')[0].toUpperCase();

      document.getElementById('member-avatar').textContent = initial;
      document.getElementById('member-name').textContent = user.username;

      var badge = document.getElementById('member-role-badge');
      badge.textContent = role.vi;
      badge.style.background = role.color;
      badge.style.color = '#fff';

      document.getElementById('member-meta').textContent = fmtDate(user.created_at);
      document.title = user.username + ' - VCEC Portal';

      renderPosts(posts);
      document.getElementById('member-loading').style.display = 'none';
      document.getElementById('member-container').style.display = 'block';
    }

    function renderPosts(posts) {
      var list = document.getElementById('member-post-list');
      var wrap = document.getElementById('member-posts-wrap');
      if (!posts || posts.length === 0) {
        wrap.style.display = 'none';
        return;
      }
      list.innerHTML = posts.map(function(p) {
        var catColor = CAT_COLORS[p.category] || '#555';
        var catLabel = CAT_LABELS[p.category] || p.category;
        return '<a href="bai-viet-chi-tiet.html?id=' + p.id + '" class="member-post-item">' +
          (p.cover_image ? '<img src="' + p.cover_image + '" alt="" class="member-post-thumb" loading="lazy">' : '') +
          '<div class="member-post-body">' +
            '<div class="member-post-title">' + tf(p,'title') + '</div>' +
            '<div class="member-post-meta">' +
              '<span class="member-post-cat" style="background:' + catColor + ';color:#fff;">' + catLabel + '</span>' +
              fmtPostDate(p.created_at) +
            '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    function loadMember() {
      if (!window.supabaseClient) { setTimeout(loadMember, 150); return; }
      if (!memberId) {
        document.getElementById('member-loading').style.display = 'none';
        document.getElementById('member-error').style.display = 'block';
        return;
      }
      window.supabaseClient
        .from('vcec_users')
        .select('id, username, role, created_at')
        .eq('id', memberId)
        .single()
        .then(function(res) {
          if (res.error || !res.data) {
            document.getElementById('member-loading').style.display = 'none';
            document.getElementById('member-error').style.display = 'block';
            return;
          }
          var user = res.data;
          window.supabaseClient
            .from('vcec_posts')
            .select('id, category, title_vi, title_zh, title_en, cover_image, created_at')
            .eq('author', user.username)
            .eq('status', 'published')
            .order('created_at', { ascending: false })
            .then(function(postsRes) {
              renderMember(user, postsRes.data || []);
            });
        });
    }

    loadMember();
    window.addEventListener('vcec-lang-change', function() {
      if (document.getElementById('member-container').style.display !== 'none') {
        loadMember();
      }
    });
  })();
  </script>
</body>
</html>
