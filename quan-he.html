<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Quan Hệ Kinh Tế Việt Nam - Trung Quốc - VCEC Portal">
  <meta property="og:description" content="Thống kê số liệu kinh tế song phương Việt - Trung mới nhất, các sự kiện hợp tác nổi bật và dữ liệu thương mại song phương thúc đẩy dòng vốn đầu tư.">
  <meta property="og:image" content="public/logo_VCEC.jpg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VCEC Portal">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Quan Hệ Kinh Tế Việt Nam - Trung Quốc - VCEC Portal">
  <meta name="twitter:description" content="Thống kê số liệu kinh tế song phương Việt - Trung mới nhất, các sự kiện hợp tác nổi bật và dữ liệu thương mại song phương thúc đẩy dòng vốn đầu tư.">
  <meta name="twitter:image" content="public/logo_VCEC.jpg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Custom simple styled responsive chart for maximum visual elegance */
    .chart-container {
      background: #FFFFFF;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid var(--vcec-gold-border);
      margin: 40px 0;
    }
    .chart-bars-wrapper {
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      height: 300px;
      padding-top: 40px;
      border-bottom: 2px solid #E2E8F0;
      position: relative;
    }
    .chart-y-axis {
      position: absolute;
      left: 10px;
      top: 10px;
      color: #718096;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .chart-bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 14%;
    }
    .chart-bars {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      width: 100%;
      height: 240px;
    }
    .bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      transition: all 0.3s ease;
      position: relative;
    }
    .bar:hover::after {
      content: attr(data-value) "B USD";
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--vcec-text-dark);
      color: #FFFFFF;
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
      white-space: nowrap;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .bar-export {
      background: var(--vcec-gold);
    }
    .bar-import {
      background: var(--vcec-red);
    }
    .chart-label {
      margin-top: 10px;
      font-weight: 700;
      color: var(--vcec-text-dark);
      font-size: 0.85rem;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 25px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    @media (max-width: 768px) {
      .chart-container {
        padding: 20px 10px;
      }
      .chart-legend {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
      .legend-item {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Shared Global Header -->
  <header id="global-header"></header>

  <!-- Main Content with Dong Son Drum watermark background -->
  <main class="bg-vietnam-motif">
    <div class="section-content">
      
      <!-- Sub-page Title Block -->
      <section class="sub-hero">
        <div class="container">
          <h1 data-i18n="nav-relations">Quan Hệ Việt - Trung</h1>
          <p style="color: var(--vcec-gold); font-size: 1.1rem; max-width: 600px; margin: 10px auto 0;" data-i18n="bilateral-subtitle">Số liệu kim ngạch xuất nhập khẩu và các dấu mốc giao thương quan trọng</p>
        </div>
      </section>

      <!-- Trade Data Section — Dynamic from vcec_posts category='quan-he-viet-trung', title='Số Liệu Hợp Tác Việt - Trung' -->
      <section class="section" id="stats-section">
        <div class="container">
          <div id="stats-post-container">
            <p style="color:#9CA3AF;text-align:center;padding:40px 0;">⏳ Đang tải số liệu...</p>
          </div>
        </div>
      </section>

      <!-- Dynamic Milestones from 'quan-he-viet-trung' category -->
      <section class="section section-grey">
        <div class="container" style="max-width: 900px;">
          <div class="section-title">
            <h2>Các Cột Mốc Giao Thương Trọng Đại</h2>
            <p>Hành trình thúc đẩy hợp tác chiến lược toàn diện thúc đẩy luân chuyển chuỗi cung ứng</p>
          </div>
          <div id="milestone-timeline" class="timeline-vcec">
            <p style="color:#9CA3AF; padding: 20px 0; text-align: center;">⏳ Đang tải...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Shared Global Footer -->
  <footer id="global-footer"></footer>

  <script src="app.js"></script>
  <script>
    (function() {
      var STATS_TITLE = 'Số Liệu Hợp Tác Việt - Trung';

      function getLang() { return localStorage.getItem('vcec_lang') || 'vi'; }
      function tf(p, f) { var l = getLang(); return p[f+'_'+l] || p[f+'_vi'] || ''; }
      function fmtContent(text) {
        if (!text) return '';
        return text.trim().charAt(0) === '<' ? text : text.split(/\n\n+/).map(function(p){ return '<p>'+p.replace(/\n/g,'<br>')+'</p>'; }).join('');
      }
      function fmtYear(iso) { return new Date(iso).getFullYear(); }
      function fmtDateLabel(iso) {
        var d = new Date(iso);
        return 'Tháng ' + String(d.getMonth()+1).padStart(2,'0') + ' / ' + d.getFullYear();
      }

      var cachedStats = null;
      var cachedMilestones = null;

      // --- Stats Post ---
      function renderStats(post) {
        var el = document.getElementById('stats-post-container');
        if (!el) return;
        if (!post) {
          el.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:40px 0;">Chưa có số liệu.</p>';
          return;
        }
        el.innerHTML =
          '<div class="section-title">' +
            '<h2>' + tf(post,'title') + '</h2>' +
            '<p>' + tf(post,'summary') + '</p>' +
          '</div>' +
          '<div class="article-body">' + fmtContent(tf(post,'content')) + '</div>';
      }

      function loadStats() {
        if (!window.supabaseClient) { setTimeout(loadStats, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('*')
          .eq('category','quan-he-viet-trung')
          .eq('status','published')
          .eq('title_vi', STATS_TITLE)
          .maybeSingle()
          .then(function(res) { cachedStats = res.data; renderStats(res.error ? null : res.data); });
      }

      // --- Milestones Timeline ---
      function renderMilestones(data) {
        var container = document.getElementById('milestone-timeline');
        if (!container) return;
        if (!data || data.length === 0) {
          container.innerHTML = '<p style="color:#9CA3AF;padding:20px 0;text-align:center;">Chưa có dấu mốc nào.</p>';
          return;
        }
        container.innerHTML = data.map(function(p, index) {
          var side = (index % 2 === 0) ? 'left-item' : 'right-item';
          return '<div class="timeline-item ' + side + '">' +
            '<div class="timeline-content">' +
              '<span class="timeline-year">' + fmtYear(p.created_at) + '</span>' +
              '<h4 class="timeline-title">' + tf(p,'title') + '</h4>' +
              '<p class="timeline-desc">' + tf(p,'summary') + '</p>' +
              '<small class="timeline-date-label">' + fmtDateLabel(p.created_at) + '</small>' +
            '</div></div>';
        }).join('');
      }

      function loadMilestones() {
        if (!window.supabaseClient) { setTimeout(loadMilestones, 150); return; }
        window.supabaseClient
          .from('vcec_posts')
          .select('id,title_vi,title_zh,title_en,summary_vi,summary_zh,summary_en,created_at')
          .eq('category','quan-he-viet-trung')
          .eq('status','published')
          .neq('title_vi', STATS_TITLE)
          .order('created_at', { ascending: false })
          .then(function(res) { cachedMilestones = res.data; renderMilestones(res.error ? null : res.data); });
      }

      loadStats();
      loadMilestones();

      window.addEventListener('vcec-lang-change', function() {
        if (cachedStats) renderStats(cachedStats);
        if (cachedMilestones) renderMilestones(cachedMilestones);
      });
    })();
  </script>
</body>
</html>
